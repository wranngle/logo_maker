name: ci

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shell-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: shellcheck
        shell: bash
        run: |
          shopt -s nullglob globstar
          files=( **/*.sh )
          [[ ${#files[@]} -eq 0 ]] && { echo "no shell files — skipping"; exit 0; }
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck
          shellcheck -S warning "${files[@]}"

  yaml-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: yamllint
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob globstar
          pip install --quiet yamllint
          files=(.github/**/*.yml .github/**/*.yaml .automation/*.json .agents/*.yml .agents/*.yaml *.yml *.yaml)
          [[ ${#files[@]} -eq 0 ]] && { echo "no yaml files - skipping"; exit 0; }
          yamllint -d "{extends: default, rules: {line-length: disable, document-start: disable, truthy: {check-keys: false}}}" "${files[@]}"

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"
      - name: install
        run: bun install --frozen-lockfile
      - name: lint
        run: bun run lint
      - name: typecheck
        run: bun run typecheck
      - name: test
        run: bun test
